<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volna — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black:         #c8c9cc;
    --black-deep:    #bdbec2;
    --surface:       #c2c3c7;
    --surface-raise: #b8b9bd;
    --white:         #0f0f10;
    --white-dim:     #252527;
    --white-muted:   #52525a;
    --white-ghost:   #8a8a92;
    --border:        rgba(15,15,16,0.13);
    --border-strong: rgba(15,15,16,0.26);
    --accent:        #0f0f10;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background:
      radial-gradient(ellipse 120% 80% at 30% 40%, rgba(210,212,218,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 80% 60% at 80% 10%,  rgba(195,198,205,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 100% 80% at 10% 90%, rgba(215,216,220,0.45) 0%, transparent 60%),
      #c8c9cc;
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    line-height: 1.7;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Paper texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='matrix' values='0 0 0 0 0.35 0 0 0 0 0.28 0 0 0 0 0.20 0 0 0 0.55 0'/%3E%3C/filter%3E%3C/rect width='100%25' height='100%25' filter='url(%23p)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    opacity: 0.10;
    pointer-events: none; z-index: 998;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(90deg, rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,10,10,0.18) 1px, transparent 1px),
      linear-gradient(0deg,  rgba(10,10,10,0.18) 1px, transparent 1px);
    background-size: 28px 1px, 1px 28px, 28px 1px, 1px 28px, 28px 1px, 1px 28px, 28px 1px, 1px 28px;
    background-position:
      24px 24px, 24px 24px,
      calc(100% - 24px) 24px, calc(100% - 24px) 24px,
      24px calc(100% - 24px), 24px calc(100% - 24px),
      calc(100% - 24px) calc(100% - 24px), calc(100% - 24px) calc(100% - 24px);
    background-repeat: no-repeat;
  }

  .paper-coarse {
    position: fixed; inset: 0; pointer-events: none; z-index: 997;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='q'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.25' numOctaves='6' stitchTiles='stitch'/%3E%3CfeColorMatrix type='matrix' values='0 0 0 0 0.30 0 0 0 0 0.24 0 0 0 0 0.16 0 0 0 0.28 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23q)'/%3E%3C/svg%3E");
    background-size: 512px 512px;
    opacity: 0.07;
  }

  /* ── Main layout ── */
  .home-wrap {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2rem;
    text-align: center;
  }

  /* ── Wordmark ── */
  .home-wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--white-muted);
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
    margin-bottom: 2.5rem;
  }

  /* ── Seal mascot ── */
  .home-seal {
    position: relative;
    width: 180px;
    height: 320px;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
    flex-shrink: 0;
  }
  #home-seal-rig {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .home-seal .s-part {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    pointer-events: none;
  }

  /* ── Welcome text ── */
  .home-welcome {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--white-dim);
    line-height: 1.2;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
  }
  .home-welcome em {
    font-style: italic;
    color: var(--white);
  }

  .home-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white-ghost);
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.75s forwards;
  }

  /* ── Nav buttons ── */
  .home-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    justify-content: center;
    max-width: 700px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.9s forwards;
  }

  .home-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white-muted);
    text-decoration: none;
    padding: 0.85rem 1.6rem;
    border: 1px solid var(--border-strong);
    border-radius: 100px;
    background: rgba(200,201,204,0.5);
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }

  .home-btn:hover {
    color: var(--black);
    border-color: var(--accent);
    background: rgba(15,15,16,0.08);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(15,15,16,0.12);
  }

  .home-btn span {
    position: relative; z-index: 1;
  }

  /* ── Footer ── */
  .home-footer {
    position: fixed;
    bottom: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white-ghost);
    opacity: 0;
    animation: fadeUp 0.9s ease 1.2s forwards;
    z-index: 10;
  }

  /* ── Top header nav ── */
  .home-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.4rem 3rem;
    border-bottom: 1px solid var(--border);
    background: rgba(200,201,204,0.85);
    backdrop-filter: blur(20px);
  }
  .home-header-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--white); text-decoration: none;
  }
  .home-header-links {
    display: flex; gap: 2rem; list-style: none;
  }
  .home-header-links a {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white-muted); text-decoration: none;
    transition: color 0.25s;
    position: relative;
  }

  /* ── Flipper Base Class ── */
  .s-r-flipper {
    display: inline-block;
    z-index: 5;
    /* Static pivot to prevent drifting */
    transform-origin: 18% 42%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="paper-coarse" aria-hidden="true"></div>

<header class="home-header">
  <a href="home.html" class="home-header-logo">Volna</a>
  <ul class="home-header-links">
    <li><a href="about.html">About</a></li>
    <li><a href="privacy.html">Privacy</a></li>
  </ul>
</header>

<div class="home-wrap">
  <p class="home-wordmark">Intelligence for Independent Fashion</p>

  <div class="home-seal">
    <div id="home-seal-rig">
      <img src="Gemini_Generated_Image_yg5wtsyg5wtsyg5w/Seal-body.png" class="s-part s-body">
      <img src="Gemini_Generated_Image_yg5wtsyg5wtsyg5w/Seal-eyes.png" class="s-part s-eyes">
      <img src="Gemini_Generated_Image_yg5wtsyg5wtsyg5w/Seal-right-flipper.png" class="s-part s-r-flipper">
      <img src="Gemini_Generated_Image_yg5wtsyg5wtsyg5w/Seal-left-flipper.png" class="s-part s-r-flipper">
      <img src="Gemini_Generated_Image_yg5wtsyg5wtsyg5w/Seal-stars.png" class="s-part s-stars">
    </div>
  </div>

  <h1 class="home-welcome">Welcome to <em>Volna</em></h1>
  <p class="home-sub">Fashion intelligence — where would you like to go?</p>

  <nav class="home-nav">
    <a href="style-finder.html"  class="home-btn"><span>Find my style</span></a>
    <a href="analytics.html"     class="home-btn"><span>Market analytics</span></a>
    <a href="designers.html"     class="home-btn"><span>Designers &amp; brands you might like</span></a>
    <a href="creators.html"      class="home-btn"><span>Creators who align with your style</span></a>
    <a href="lookbook.html"      class="home-btn"><span>Make me a lookbook</span></a>
  </nav>
</div>

<p class="home-footer">Volna &mdash; Independent Fashion Intelligence</p>
